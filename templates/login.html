<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NeuroStamp Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary-neon: #00ff9d;
            --secondary-neon: #ff0055;
            --bg-color: #050505;
            --surface: #111111;
            --border-color: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                linear-gradient(to right, rgba(128, 128, 128, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(128, 128, 128, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.05);
            overflow: hidden;
        }

        .brand-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            text-align: center;
        }

        .brand-title span {
            color: var(--primary-neon);
            text-shadow: 0 0 12px rgba(0, 255, 157, 0.5);
        }

        .brand-sub {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #555;
            margin-top: -6px;
        }

        .tab-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #555;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .tab-btn.active-login {
            border-bottom-color: var(--primary-neon);
            background: rgba(0, 255, 157, 0.06);
            color: #fff;
        }

        .tab-btn.active-register {
            border-bottom-color: var(--secondary-neon);
            background: rgba(255, 0, 85, 0.06);
            color: #fff;
        }

        .tab-btn:hover:not(.active-login):not(.active-register) {
            color: #aaa;
            background: rgba(255, 255, 255, 0.03);
        }

        .form-body {
            padding: 2rem;
        }

        label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }

        .cyber-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 14px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .cyber-input:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 8px rgba(0, 255, 157, 0.2);
        }

        .cyber-input.red:focus {
            border-color: var(--secondary-neon);
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.2);
        }

        .btn-execute {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-execute:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .status-bar {
            background: #000;
            border-top: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #444;
        }

        .status-bar .online {
            color: var(--primary-neon);
        }

        .msg-box {
            display: none;
            padding: 10px 14px;
            font-size: 0.75rem;
            border-radius: 3px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .msg-success {
            border: 1px solid #00ff9d;
            background: rgba(0, 255, 157, 0.08);
            color: #00ff9d;
        }

        .msg-error {
            border: 1px solid #ff0055;
            background: rgba(255, 0, 85, 0.08);
            color: #ff0055;
        }
    </style>
</head>

<body>
    <div style="width:100%; max-width:440px; padding: 1rem;">
        <div class="mb-4">
            <div class="brand-title">NEURO<span>STAMP</span></div>
            <div class="brand-sub">— Secure Access Gateway —</div>
        </div>

        <div class="login-card">
            <div class="tab-bar">
                <button class="tab-btn active-login" id="tab-login" onclick="toggleMode('login')">[ LOGIN ]</button>
                <button class="tab-btn" id="tab-register" onclick="toggleMode('register')">[ REGISTER ]</button>
            </div>

            <form class="form-body" id="authForm" onsubmit="handleAuth(event)">
                <div id="msgBox" class="msg-box"></div>

                <div style="margin-bottom: 1.2rem;">
                    <label>Codename</label>
                    <input class="cyber-input" id="username" name="username" placeholder="USER_ID..." type="text"
                        required>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label>Access Key</label>
                    <input class="cyber-input red" id="password" name="password" placeholder="••••••••••••"
                        type="password" required>
                </div>

                <button class="btn-execute" type="submit">
                    <span id="btnText">EXECUTE LOGIN</span>
                </button>
            </form>

            <div class="status-bar">
                <span>STATUS: <span class="online">ONLINE</span></span>
                <span>ENC: <span class="online">AES-256</span></span>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode(mode) {
            isLoginMode = (mode === 'login');
            const btn = document.getElementById('btnText');
            const tabLogin = document.getElementById('tab-login');
            const tabReg = document.getElementById('tab-register');

            if (isLoginMode) {
                btn.innerText = "EXECUTE LOGIN";
                tabLogin.className = "tab-btn active-login";
                tabReg.className = "tab-btn";
            } else {
                btn.innerText = "CREATE IDENTITY";
                tabReg.className = "tab-btn active-register";
                tabLogin.className = "tab-btn";
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const endpoint = isLoginMode ? "/login" : "/register";
            const msgBox = document.getElementById('msgBox');
            msgBox.style.display = 'none';

            try {
                const res = await fetch(endpoint, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.status === 'success') {
                    if (isLoginMode) {
                        window.location.href = "/dashboard";
                    } else {
                        msgBox.innerText = `ID CREATED: ${data.message.split(': ')[1]}. PLEASE LOGIN.`;
                        msgBox.className = "msg-box msg-success";
                        msgBox.style.display = 'block';
                        toggleMode('login');
                    }
                } else {
                    msgBox.innerText = `ERROR: ${data.message || data.error}`;
                    msgBox.className = "msg-box msg-error";
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                alert("Server Connection Failed");
            }
        }
    </script>
</body>

</html>
